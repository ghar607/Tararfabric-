<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories — Libas Admin</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="brand">LIBAS<span>Admin Panel</span></div>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="categories.html" class="active">Categories</a>
    <a href="orders.html">Orders</a>
    <a href="deals.html">Deals</a>
    <a href="settings.html">Settings</a>
  </aside>
  <main class="main">
    <div class="topbar">
      <h2>Categories</h2>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="modal-box" style="margin-bottom:24px; max-width:480px; padding:20px;">
      <div class="form-group" style="margin:0 0 10px;">
        <label>Parent Category (leave as "None" for a main category)</label>
        <select id="new-cat-parent" style="width:100%;">
          <option value="">— None (Main Category) —</option>
        </select>
      </div>
      <div class="form-group" style="display:flex; gap:10px; margin:0;">
        <input type="text" id="new-cat-name" placeholder="Category name" style="flex:1;">
        <button class="btn btn-primary" onclick="addCategory()">Add</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Category Name</th><th>Type</th><th>Actions</th></tr></thead>
        <tbody id="cat-body"><tr><td colspan="3" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/admin.js"></script>
<script>
requireLogin();
let categories = [];

function buildParentOptions(selectedId) {
  const mains = categories.filter(c => !c.parentId);
  const sel = document.getElementById('new-cat-parent');
  sel.innerHTML = '<option value="">— None (Main Category) —</option>' +
    mains.map(c => `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${c.name}</option>`).join('');
}

async function loadCategories() {
  categories = await apiGet('/categories') || [];
  buildParentOptions();
  const body = document.getElementById('cat-body');
  if (!categories.length) {
    body.innerHTML = '<tr><td colspan="3" class="empty">No categories yet</td></tr>';
    return;
  }
  const mains = categories.filter(c => !c.parentId);
  const rows = [];
  mains.forEach(main => {
    rows.push(`
      <tr>
        <td><strong>${main.name}</strong></td>
        <td><span class="badge in_stock">Main Category</span></td>
        <td class="action-row">
          <button class="btn btn-sm" onclick="renameCategory('${main.id}')">Rename</button>
          <button class="btn btn-sm btn-danger" onclick="deleteCategory('${main.id}')">Delete</button>
        </td>
      </tr>
    `);
    const subs = categories.filter(c => c.parentId === main.id);
    subs.forEach(sub => {
      rows.push(`
        <tr>
          <td style="padding-left:32px; color:#6b5d4d;">↳ ${sub.name}</td>
          <td><span style="color:#a39a8f; font-size:0.8rem;">Sub-category</span></td>
          <td class="action-row">
            <button class="btn btn-sm" onclick="renameCategory('${sub.id}')">Rename</button>
            <button class="btn btn-sm btn-danger" onclick="deleteCategory('${sub.id}')">Delete</button>
          </td>
        </tr>
      `);
    });
  });
  const orphans = categories.filter(c => c.parentId && !mains.find(m => m.id === c.parentId));
  orphans.forEach(o => {
    rows.push(`
      <tr>
        <td style="padding-left:32px; color:#6b5d4d;">↳ ${o.name}</td>
        <td><span style="color:#a39a8f; font-size:0.8rem;">Sub-category</span></td>
        <td class="action-row">
          <button class="btn btn-sm" onclick="renameCategory('${o.id}')">Rename</button>
          <button class="btn btn-sm btn-danger" onclick="deleteCategory('${o.id}')">Delete</button>
        </td>
      </tr>
    `);
  });
  body.innerHTML = rows.join('');
}

async function addCategory() {
  const input = document.getElementById('new-cat-name');
  const name = input.value.trim();
  const parentId = document.getElementById('new-cat-parent').value || null;
  if (!name) return;
  await apiJSON('/admin/categories', 'POST', { name, parentId });
  input.value = '';
  document.getElementById('new-cat-parent').value = '';
  showToast('Category added');
  loadCategories();
}

async function renameCategory(id) {
  const current = categories.find(c => c.id === id);
  const name = prompt('New category name:', current?.name || '');
  if (!name) return;
  await apiJSON('/admin/categories/' + id, 'PUT', { name });
  showToast('Category updated');
  loadCategories();
}

async function deleteCategory(id) {
  if (!confirm('Delete this category? Sub-categories under it will remain but become unlinked.')) return;
  await apiJSON('/admin/categories/' + id, 'DELETE');
  showToast('Category deleted');
  loadCategories();
}

loadCategories();
</script>
</body>
</html>
